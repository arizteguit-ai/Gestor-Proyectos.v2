    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createClient } = window.supabase;

        const SUPABASE_URL = 'https://lxuqrnmnbozuqbutcehg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_j2sXGY7gDh74lbNAuGlFLA_T9CRpJ2Z';

        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        const USUARIOS = ['JIA', 'OB', 'TA', 'LM'];

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [view, setView] = useState('list');
            const [proyectos, setProyectos] = useState([]);
            const [tareas, setTareas] = useState([]);
            const [selectedProyecto, setSelectedProyecto] = useState(null);
            const [showModal, setShowModal] = useState(false);
            const [showTaskModal, setShowTaskModal] = useState(false);
            const [showEditProjectModal, setShowEditProjectModal] = useState(false);
            const [showEditTaskModal, setShowEditTaskModal] = useState(false);
            const [loading, setLoading] = useState(true);
            const [editingProject, setEditingProject] = useState(null);
            const [editingTask, setEditingTask] = useState(null);
            
            const [formData, setFormData] = useState({
                nombre: '',
                descripcion: '',
                fecha_inicio: '',
                fecha_vencimiento: '',
                responsable: '',
                prioridad: 'Media',
                estado: 'En progreso',
                url: '',
                notas: '',
                compartir_con: [],
            });

            const [taskFormData, setTaskFormData] = useState({
                nombre: '',
                descripcion: '',
                responsable: '',
                fecha_vencimiento: '',
                prioridad: 'Media',
                estado: 'To do',
                url: '',
                notas: '',
            });

            useEffect(() => {
                const user = localStorage.getItem('currentUser');
                if (user) {
                    setCurrentUser(user);
                    loadProyectos(user);
                }
            }, []);

            const selectUser = (usuario) => {
                localStorage.setItem('currentUser', usuario);
                setCurrentUser(usuario);
                loadProyectos(usuario);
            };

            const changeUser = () => {
                localStorage.removeItem('currentUser');
                setCurrentUser(null);
                setView('list');
            };

            const loadProyectos = async (usuario) => {
                setLoading(true);
                try {
                    const { data, error } = await supabase
                        .from('proyectos')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (error) throw error;

                    const filtrados = data.filter(p => {
                        const compartirCon = p.compartir_con || [];
                        return compartirCon.includes(usuario);
                    });

                    setProyectos(filtrados);
                    loadAllTareas();
                } catch (error) {
                    console.error('Error loading proyectos:', error);
                }
                setLoading(false);
            };

            const loadAllTareas = async () => {
                try {
                    const { data, error } = await supabase
                        .from('tareas')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (error) throw error;
                    setTareas(data || []);
                } catch (error) {
                    console.error('Error loading all tareas:', error);
                }
            };

            const handleCreateProyecto = async () => {
                if (!formData.nombre.trim()) {
                    alert('Por favor ingresa un nombre para el proyecto');
                    return;
                }
                if (formData.compartir_con.length === 0) {
                    alert('Por favor selecciona al menos una persona para compartir');
                    return;
                }

                try {
                    const compartirCon = formData.compartir_con.length > 0 ? formData.compartir_con : [currentUser];
                    
                    const { data, error } = await supabase
                        .from('proyectos')
                        .insert([{
                            ...formData,
                            compartir_con: compartirCon,
                        }])
                        .select();
                    
                    if (error) throw error;
                    
                    setProyectos([data[0], ...proyectos]);
                    resetFormData();
                    setShowModal(false);
                } catch (error) {
                    console.error('Error creating proyecto:', error);
                    alert('Error al crear el proyecto');
                }
            };

            const handleEditProyecto = async () => {
                if (!editingProject.nombre.trim()) {
                    alert('Por favor ingresa un nombre para el proyecto');
                    return;
                }

                try {
                    const compartirCon = editingProject.compartir_con || [currentUser];
                    
                    const { error } = await supabase
                        .from('proyectos')
                        .update({
                            nombre: editingProject.nombre,
                            descripcion: editingProject.descripcion,
                            fecha_inicio: editingProject.fecha_inicio,
                            fecha_vencimiento: editingProject.fecha_vencimiento,
                            responsable: editingProject.responsable,
                            prioridad: editingProject.prioridad,
                            estado: editingProject.estado,
                            url: editingProject.url,
                            notas: editingProject.notas,
                            compartir_con: compartirCon,
                        })
                        .eq('id', editingProject.id);
                    
                    if (error) throw error;
                    
                    const updatedProyectos = proyectos.map(p =>
                        p.id === editingProject.id ? editingProject : p
                    );
                    setProyectos(updatedProyectos);
                    
                    if (selectedProyecto?.id === editingProject.id) {
                        setSelectedProyecto(editingProject);
                    }
                    
                    setShowEditProjectModal(false);
                    setEditingProject(null);
                } catch (error) {
                    console.error('Error updating proyecto:', error);
                    alert('Error al actualizar el proyecto');
                }
            };

            const handleCreateTarea = async () => {
                if (!taskFormData.nombre.trim()) {
                    alert('Por favor ingresa un nombre para la tarea');
                    return;
                }

                try {
                    const { data, error } = await supabase
                        .from('tareas')
                        .insert([{
                            ...taskFormData,
                            proyecto_id: selectedProyecto.id,
                        }])
                        .select();
                    
                    if (error) throw error;
                    
                    setTareas([data[0], ...tareas]);
                    resetTaskFormData();
                    setShowTaskModal(false);
                } catch (error) {
                    console.error('Error creating tarea:', error);
                    alert('Error al crear la tarea');
                }
            };

            const handleEditTarea = async () => {
                if (!editingTask.nombre.trim()) {
                    alert('Por favor ingresa un nombre para la tarea');
                    return;
                }

                try {
                    const { error } = await supabase
                        .from('tareas')
                        .update({
                            nombre: editingTask.nombre,
                            descripcion: editingTask.descripcion,
                            estado: editingTask.estado,
                            prioridad: editingTask.prioridad,
                            responsable: editingTask.responsable,
                            fecha_vencimiento: editingTask.fecha_vencimiento,
                            url: editingTask.url,
                            notas: editingTask.notas,
                        })
                        .eq('id', editingTask.id);
                    
                    if (error) throw error;
                    
                    setTareas(tareas.map(t =>
                        t.id === editingTask.id ? editingTask : t
                    ));
                    
                    setShowEditTaskModal(false);
                    setEditingTask(null);
                } catch (error) {
                    console.error('Error updating tarea:', error);
                    alert('Error al actualizar la tarea');
                }
            };

            const handleToggleTarea = async (tarea) => {
                try {
                    const { error } = await supabase
                        .from('tareas')
                        .update({ completado: !tarea.completado })
                        .eq('id', tarea.id);
                    
                    if (error) throw error;
                    
                    setTareas(tareas.map(t =>
                        t.id === tarea.id ? { ...t, completado: !t.completado } : t
                    ));
                } catch (error) {
                    console.error('Error updating tarea:', error);
                }
            };

            const handleDeleteProyecto = async (id) => {
                if (!confirm('¿Estás seguro de que quieres eliminar este proyecto?')) {
                    return;
                }

                try {
                    const { error } = await supabase
                        .from('proyectos')
                        .delete()
                        .eq('id', id);
                    
                    if (error) throw error;
                    
                    setProyectos(proyectos.filter(p => p.id !== id));
                    if (selectedProyecto?.id === id) {
                        setView('list');
                        setSelectedProyecto(null);
                    }
                } catch (error) {
                    console.error('Error deleting proyecto:', error);
                    alert('Error al eliminar el proyecto');
                }
            };

            const handleDeleteTarea = async (id) => {
                if (!confirm('¿Estás seguro?')) {
                    return;
                }

                try {
                    const { error } = await supabase
                        .from('tareas')
                        .delete()
                        .eq('id', id);
                    
                    if (error) throw error;
                    
                    setTareas(tareas.filter(t => t.id !== id));
                } catch (error) {
                    console.error('Error deleting tarea:', error);
                    alert('Error al eliminar la tarea');

                                <div className="header-right-new">
                                    <button className="btn btn-primary btn-nuevo-large" onClick={() => {
                                        resetFormData();
                                        setShowModal(true);
                                    }}>
                                        <i className="ti ti-plus"></i> Nuevo Proyecto
                                    </button>
                                    <div className="header-user-flex">
                                        <div className="user-badge">
                                            <i className="ti ti-user"></i>
                                            {currentUser}

                                        </button>

                        </header>

                        <div className="container">
                            <button className="btn btn-secondary back-button" onClick={() => {
                                setView('list');
                                setSelectedProyecto(null);
                            }}>
                                <i className="ti ti-arrow-left"></i> Volver
                            </button>

                            <div className="project-detail">
                                <div className="detail-header">
                                    <div className="detail-title">{selectedProyecto.nombre}</div>
                                    {selectedProyecto.descripcion && <div className="detail-desc">{selectedProyecto.descripcion}</div>}
                                    <div className="detail-actions">
                                        <button className="btn btn-primary btn-small" onClick={() => {
                                            setEditingProject(selectedProyecto);
                                            setShowEditProjectModal(true);
                                        }}>
                                            <i className="ti ti-edit"></i> Editar
                                        </button>
                                        <button className="btn btn-danger btn-small" onClick={() => handleDeleteProyecto(selectedProyecto.id)}>
                                            <i className="ti ti-trash"></i> Eliminar
                                        </button>
                                    </div>
                                </div>

                                <div className="info-grid">
                                    <div className="info-box">
                                        <div className="info-label">Estado</div>
                                        <div className="info-value">{selectedProyecto.estado}</div>
                                    </div>
                                    <div className="info-box">
                                        <div className="info-label">Responsable</div>
                                        <div className="info-value">{selectedProyecto.responsable || '—'}</div>
                                    </div>
                                    <div className="info-box">
                                        <div className="info-label">Prioridad</div>
                                        <div className="info-value">{selectedProyecto.prioridad}</div>
                                    </div>
                                    <div className="info-box">
                                        <div className="info-label">Progreso</div>
                                        <div className="info-value">{progreso}%</div>
                                    </div>
                                </div>

                                <div className="progress-section">
                                    <div className="progress-label">
                                        <span>Progreso</span>
                                        <strong>{progreso}%</strong>
                                    </div>
                                    <div className="progress-bar">
                                        <div className="progress-fill" style={{width: progreso + '%'}}></div>
                                    </div>
                                    <div className="task-count">{completadas}/{tareasProyecto.length} tareas completadas</div>
                                </div>

                                {selectedProyecto.url && (
                                    <div className="info-box" style={{marginBottom: '16px'}}>
                                        <div className="info-label">URL</div>
                                        <div className="info-value"><a href={selectedProyecto.url} target="_blank" rel="noopener noreferrer">{selectedProyecto.url}</a></div>
                                    </div>
                                )}

                                <div className="tasks-section">
                                    <div className="section-header">
                                        <span>Tareas ({tareasProyecto.length})</span>
                                        <button className="btn btn-primary btn-small" onClick={() => setShowTaskModal(true)}>
                                            <i className="ti ti-plus"></i> Nueva
                                        </button>
                                    </div>

                                    <div className="task-stats">
                                        <div className="stat-card">
                                            <div className="info-label">Completadas</div>
                                            <div className="stat-value">{completadas}/{tareasProyecto.length}</div>
                                        </div>
                                    </div>

                                    {tareasProyecto.length === 0 ? (
                                        <div className="empty-state">
                                            <div className="empty-icon">📋</div>
                                            <div className="empty-title">Sin tareas</div>
                                            <p>Crea una nueva tarea para comenzar</p>
                                        </div>
                                    ) : (
                                        <div className="tasks-list">
                                            {tareasProyecto.map(tarea => (
                                                <div key={tarea.id} className={`task-item ${tarea.completado ? 'completed' : ''}`}>

                                                        type="checkbox"
                                                        className="task-checkbox"
                                                        checked={tarea.completado}
                                                        onChange={() => handleToggleTarea(tarea)}
                                                    />
                                                    <div className="task-content">
                                                        <div className="task-title">{tarea.nombre}</div>
                                                        {tarea.descripcion && <div className="task-desc">{tarea.descripcion}</div>}
                                                        <div className="task-meta">
                                                            <span className="task-badge">{tarea.estado}</span>
                                                            <span className="task-badge">{tarea.prioridad}</span>
                                                            {tarea.responsable && <span>👤 {tarea.responsable}</span>}
                                                            {tarea.fecha_vencimiento && <span>📅 {new Date(tarea.fecha_vencimiento).toLocaleDateString('es-AR')}</span>}
                                                        </div>
                                                    </div>
                                                    <div className="task-actions">
                                                        <button className="btn btn-primary btn-small" onClick={() => {
                                                            setEditingTask(tarea);
                                                            setShowEditTaskModal(true);
                                                        }}>
                                                            <i className="ti ti-edit"></i>
                                                        </button>
                                                        <button className="btn btn-danger btn-small" onClick={() => handleDeleteTarea(tarea.id)}>
                                                            <i className="ti ti-trash"></i> Eliminar
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {showTaskModal && (
                                <div className="modal-overlay" onClick={() => setShowTaskModal(false)}>
                                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                                        <h2>Nueva Tarea</h2>
                                        <div className="form-group">
                                            <label>Nombre *</label>
                                            <input type="text" value={taskFormData.nombre} onChange={(e) => setTaskFormData({...taskFormData, nombre: e.target.value})} />
                                        </div>
                                        <div className="form-group">
                                            <label>Descripción</label>
                                            <textarea value={taskFormData.descripcion} onChange={(e) => setTaskFormData({...taskFormData, descripcion: e.target.value})} />
                                        </div>
                                        <div className="form-row">
                                            <div className="form-group">
                                                <label>Estado</label>
                                                <select value={taskFormData.estado} onChange={(e) => setTaskFormData({...taskFormData, estado: e.target.value})}>
                                                    <option>To do</option>
                                                    <option>En progreso</option>
                                                    <option>Hecho</option>
                                                </select>
                                            </div>
                                            <div className="form-group">
                                                <label>Prioridad</label>
                                                <select value={taskFormData.prioridad} onChange={(e) => setTaskFormData({...taskFormData, prioridad: e.target.value})}>
                                                    <option>Baja</option>
                                                    <option>Media</option>
                                                    <option>Alta</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div className="form-group">
                                            <label>Responsable</label>
                                            <select value={taskFormData.responsable} onChange={(e) => setTaskFormData({...taskFormData, responsable: e.target.value})}>
                                                <option value="">Sin asignar</option>
                                                {USUARIOS.map(u => <option key={u} value={u}>{u}</option>)}
                                            </select>
                                        </div>
                                        <div className="form-group">
                                            <label>Fecha vencimiento</label>
                                            <input type="date" value={taskFormData.fecha_vencimiento} onChange={(e) => setTaskFormData({...taskFormData, fecha_vencimiento: e.target.value})} />
                                        </div>
                                        <div className="form-group">
                                            <label>URL</label>
                                            <input type="url" value={taskFormData.url} onChange={(e) => setTaskFormData({...taskFormData, url: e.target.value})} />
                                        </div>
                                        <div className="form-group">
                                            <label>Notas</label>
                                            <textarea value={taskFormData.notas} onChange={(e) => setTaskFormData({...taskFormData, notas: e.target.value})} />
                                        </div>
                                        <div className="form-actions">
                                            <button className="btn btn-primary" onClick={handleCreateTarea}><i className="ti ti-check"></i> Crear</button>
                                            <button className="btn btn-secondary" onClick={() => setShowTaskModal(false)}><i className="ti ti-x"></i> Cancelar</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {showEditTaskModal && editingTask && (
                                <div className="modal-overlay" onClick={() => setShowEditTaskModal(false)}>
                                    <div className="modal" onClick={(e) => e.stopPropagation()}>

                                            <label>Nombre *</label>
                                            <input type="text" value={editingTask.nombre} onChange={(e) => setEditingTask({...editingTask, nombre: e.target.value})} />
                                        </div>

                                            <label>Descripción</label>

                                        <div className="form-group">
                                            <label>Fecha vencimiento</label>
                                            <input type="date" value={editingTask.fecha_vencimiento} onChange={(e) => setEditingTask({...editingTask, fecha_vencimiento: e.target.value})} />
                                        </div>
                                        <div className="form-group">
                                            <label>URL</label>
                                            <input type="url" value={editingTask.url} onChange={(e) => setEditingTask({...editingTask, url: e.target.value})} />
                                        </div>
                                        <div className="form-group">
                                            <label>Notas</label>
                                            <textarea value={editingTask.notas} onChange={(e) => setEditingTask({...editingTask, notas: e.target.value})} />
                                        </div>
                                        <div className="form-actions">
                                            <button className="btn btn-primary" onClick={handleEditTarea}><i className="ti ti-check"></i> Guardar</button>
                                            <button className="btn btn-secondary" onClick={() => setShowEditTaskModal(false)}><i className="ti ti-x"></i> Cancelar</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {showEditProjectModal && editingProject && (
                                <div className="modal-overlay" onClick={() => setShowEditProjectModal(false)}>
                                    <div className="modal" onClick={(e) => e.stopPropagation()}>

                                        </div>
                                        <div className="form-group">

                                            <textarea value={editingProject.descripcion} onChange={(e) => setEditingProject({...editingProject, descripcion: e.target.value})} />
                                        </div>
                                        <div className="form-row">
                                            <div className="form-group">
                                                <label>Estado</label>
                                                <select value={editingProject.estado} onChange={(e) => setEditingProject({...editingProject, estado: e.target.value})}>

                                                    <option>Bloqueado</option>
                                                    <option>Completado</option>
                                                </select>
                                            </div>
                                            <div className="form-group">
                                                <label>Prioridad</label>
                                                <select value={editingProject.prioridad} onChange={(e) => setEditingProject({...editingProject, prioridad: e.target.value})}>

                                                    <option>Alta</option>

                                            </select>
                                        </div>
                                        <div className="form-row">
                                            <div className="form-group">
                                                <label>Fecha inicio</label>
                                                <input type="date" value={editingProject.fecha_inicio} onChange={(e) => setEditingProject({...editingProject, fecha_inicio: e.target.value})} />
                                            </div>
                                            <div className="form-group">
                                                <label>Fecha vencimiento</label>
                                                <input type="date" value={editingProject.fecha_vencimiento} onChange={(e) => setEditingProject({...editingProject, fecha_vencimiento: e.target.value})} />
                                            </div>
                                        </div>
                                        <div className="form-group">
                                            <label>URL</label>
                                            <input type="url" value={editingProject.url} onChange={(e) => setEditingProject({...editingProject, url: e.target.value})} />
                                        </div>
                                        <div className="form-group">
                                            <label>Notas</label>
                                            <textarea value={editingProject.notas} onChange={(e) => setEditingProject({...editingProject, notas: e.target.value})} />
                                        </div>
                                        <div className="form-group">
                                            <label>Compartir con</label>
                                            <div style={{display: 'flex', gap: '12px', flexWrap: 'wrap'}}>
                                                {USUARIOS.map(u => (
                                                    <label key={u} style={{display: 'flex', alignItems: 'center', gap: '6px', cursor: 'pointer'}}>
                                                        <input type="checkbox" checked={(editingProject.compartir_con || []).includes(u)} onChange={(e) => {
                                                            const updated = e.target.checked ? [...(editingProject.compartir_con || []), u] : (editingProject.compartir_con || []).filter(x => x !== u);
                                                            setEditingProject({...editingProject, compartir_con: updated});
                                                        }} />
                                                        {u}
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="form-actions">
                                            <button className="btn btn-primary" onClick={handleEditProyecto}><i className="ti ti-check"></i> Guardar</button>
                                            <button className="btn btn-secondary" onClick={() => setShowEditProjectModal(false)}><i className="ti ti-x"></i> Cancelar</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

                                    alt="Clipper Life" 
                                    className="header-logo-center"
                                />
                            </div>
                            <div className="header-right-new">
                                <button className="btn btn-primary btn-nuevo-large" onClick={() => {
                                    resetFormData();
                                    setShowModal(true);
                                }}>
                                    <i className="ti ti-plus"></i> Nuevo Proyecto
                                </button>
                                <div className="header-user-flex">
                                    <div className="user-badge">
                                        <i className="ti ti-user"></i>
                                        {currentUser}
                                    </div>
                                    <button className="btn btn-cambiar" onClick={changeUser}>
                                        Cambiar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="container">
                        {proyectos.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-icon">📊</div>
                                <div className="empty-title">Sin proyectos</div>
                                <p>Crea uno nuevo para empezar a gestionar tareas</p>
                            </div>
                        ) : (
                            <div className="dashboard-grid">
                                {proyectos.map(proyecto => {
                                    const tareasProyecto = tareas.filter(t => t.proyecto_id === proyecto.id);
                                    const completadas = tareasProyecto.filter(t => t.completado).length;
                                    const progreso = tareasProyecto.length > 0 ? Math.round((completadas / tareasProyecto.length) * 100) : 0;

                                    return (
                                        <div key={proyecto.id} className="project-card">
                                            <div className="project-header">
                                                <div>
                                                    <div className="project-title">{proyecto.nombre}</div>
                                                    <span className={`badge ${getEstadoBadge(proyecto.estado)}`}>{proyecto.estado}</span>
                                                </div>
                                            </div>
                                            
                                            {proyecto.descripcion && <div className="project-desc">{proyecto.descripcion}</div>}
                                            
                                            <div className="project-meta">
                                                {proyecto.fecha_inicio && <div className="meta-item"><i className="ti ti-calendar"></i> Inicio: {new Date(proyecto.fecha_inicio).toLocaleDateString('es-AR')}</div>}
                                                {proyecto.fecha_vencimiento && <div className="meta-item"><i className="ti ti-alarm-clock"></i> Vencimiento: {new Date(proyecto.fecha_vencimiento).toLocaleDateString('es-AR')}</div>}
                                            </div>

                                            <div className="progress-section">
                                                <div className="progress-label">
                                                    <span>Progreso</span>
                                                    <strong>{progreso}%</strong>
                                                </div>
                                                <div className="progress-bar">
                                                    <div className="progress-fill" style={{width: progreso + '%'}}></div>
                                                </div>
                                                <div className="task-count">{completadas}/{tareasProyecto.length} tareas completadas</div>
                                            </div>

                                            <div className="card-actions">
                                                <button className="btn btn-primary" onClick={() => {
                                                    setSelectedProyecto(proyecto);
                                                    loadAllTareas();
                                                    setView('detail');
                                                }}>
                                                    <i className="ti ti-arrow-right"></i> Abrir
                                                </button>
                                                <button className="btn btn-danger" onClick={() => handleDeleteProyecto(proyecto.id)}>
                                                    <i className="ti ti-trash"></i> Eliminar
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {showModal && (
                            <div className="modal-overlay" onClick={() => setShowModal(false)}>
                                <div className="modal" onClick={(e) => e.stopPropagation()}>
                                    <h2>Nuevo Proyecto</h2>
                                    <div className="form-group">
                                        <label>Nombre *</label>
                                        <input type="text" value={formData.nombre} onChange={(e) => setFormData({...formData, nombre: e.target.value})} />
                                    </div>
                                    <div className="form-group">
                                        <label>Descripción</label>
                                        <textarea value={formData.descripcion} onChange={(e) => setFormData({...formData, descripcion: e.target.value})} />
                                    </div>
                                    <div className="form-group">
                                        <label>Responsable</label>
                                        <select value={formData.responsable} onChange={(e) => setFormData({...formData, responsable: e.target.value})}>
                                            <option value="">Sin asignar</option>
                                            {USUARIOS.map(u => <option key={u} value={u}>{u}</option>)}
                                        </select>
                                    </div>
                                    <div className="form-row">
                                        <div className="form-group">
                                            <label>Fecha inicio</label>
                                            <input type="date" value={formData.fecha_inicio} onChange={(e) => setFormData({...formData, fecha_inicio: e.target.value})} />
                                        </div>
                                        <div className="form-group">
                                            <label>Fecha vencimiento</label>
                                            <input type="date" value={formData.fecha_vencimiento} onChange={(e) => setFormData({...formData, fecha_vencimiento: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="form-row">
                                        <div className="form-group">
                                            <label>Estado</label>
                                            <select value={formData.estado} onChange={(e) => setFormData({...formData, estado: e.target.value})}>
                                                <option>En progreso</option>
                                                <option>Bloqueado</option>
                                                <option>Completado</option>
                                            </select>
                                        </div>
                                        <div className="form-group">
                                            <label>Prioridad</label>
                                            <select value={formData.prioridad} onChange={(e) => setFormData({...formData, prioridad: e.target.value})}>
                                                <option>Baja</option>
                                                <option>Media</option>
                                                <option>Alta</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="form-group">
                                        <label>URL</label>
                                        <input type="url" value={formData.url} onChange={(e) => setFormData({...formData, url: e.target.value})} />
                                    </div>
                                    <div className="form-group">
                                        <label>Notas</label>
                                        <textarea value={formData.notas} onChange={(e) => setFormData({...formData, notas: e.target.value})} />
                                    </div>
                                    <div className="form-group">
                                        <label>Compartir con (selecciona al menos uno)</label>
                                        <div style={{display: 'flex', gap: '12px', flexWrap: 'wrap'}}>
                                            {USUARIOS.map(u => (
                                                <label key={u} style={{display: 'flex', alignItems: 'center', gap: '6px', cursor: 'pointer'}}>
                                                    <input type="checkbox" checked={formData.compartir_con.includes(u)} onChange={(e) => {
                                                        const updated = e.target.checked ? [...formData.compartir_con, u] : formData.compartir_con.filter(x => x !== u);
                                                        setFormData({...formData, compartir_con: updated});
                                                    }} />
                                                    {u}
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="form-actions">
                                        <button className="btn btn-primary" onClick={handleCreateProyecto}><i className="ti ti-check"></i> Crear</button>
                                        <button className="btn btn-secondary" onClick={() => setShowModal(false)}><i className="ti ti-x"></i> Cancelar</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
